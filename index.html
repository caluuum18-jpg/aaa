<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Bench">
  <meta name="theme-color" content="#0e0f12">
  <title>Bench Program</title>
  <link rel="manifest" href="manifest.json">
  <style>
/* =========================================================================
   Bench Program - clean dark minimal
   ========================================================================= */

:root {
  /* base palette */
  --bg: #0e0f12;
  --surface: #16181d;
  --surface-2: #1d2026;
  --surface-3: #252830;
  --border: #2a2e37;
  --border-strong: #3a3f4a;

  /* text */
  --text: #ebecef;
  --text-dim: #9aa0ab;
  --text-faint: #6b7280;

  /* accent (subtle) */
  --accent: #c5c8d0;
  --accent-strong: #ffffff;

  /* status colors */
  --st-pending: #4a4f5a;
  --st-fail: #d24a3a;
  --st-partial: #d98e2b;
  --st-completed: #a6d957;
  --st-too-easy: #4caf50;

  /* spacing */
  --pad: 16px;
  --gap: 12px;
  --radius: 14px;
  --radius-sm: 10px;

  /* typography */
  --font-body: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
  --font-display: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.4;
  min-height: 100vh;
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior-y: contain;
}

body {
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
  padding-left: env(safe-area-inset-left);
  padding-right: env(safe-area-inset-right);
}

button {
  font: inherit;
  color: inherit;
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
}

/* =========================================================================
   App shell
   ========================================================================= */

#app {
  max-width: 640px;
  margin: 0 auto;
  padding-bottom: 80px; /* leave room for the tab bar */
}

.view {
  display: none;
  padding: var(--pad);
  animation: fadeIn 0.2s ease-out;
}
.view.active {
  display: block;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* =========================================================================
   Block header (nav arrows + block name + current badge)
   ========================================================================= */

.block-header {
  display: grid;
  grid-template-columns: 44px 1fr 44px;
  align-items: center;
  gap: 8px;
  padding: 8px 0 4px 0;
}

.nav-arrow {
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-dim);
  font-size: 22px;
  border-radius: var(--radius-sm);
  transition: background 0.15s, color 0.15s;
}
.nav-arrow:hover { color: var(--text); background: var(--surface-2); }
.nav-arrow:active { background: var(--surface-3); }
.nav-arrow:disabled { opacity: 0.25; cursor: not-allowed; }

.block-title-wrap {
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.block-title {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.01em;
  display: flex;
  align-items: center;
  gap: 8px;
}

.block-badge {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  padding: 3px 8px;
  border-radius: 999px;
  text-transform: uppercase;
}
.block-badge.current { background: var(--text); color: var(--bg); }
.block-badge.past    { background: var(--surface-3); color: var(--text-dim); }
.block-badge.future  { background: var(--surface-3); color: var(--text-dim); }

.block-meta {
  font-size: 13px;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 12px;
}
.block-meta .goal-edit {
  color: var(--text);
  text-decoration: underline;
  text-decoration-color: var(--border-strong);
  text-underline-offset: 3px;
}

/* =========================================================================
   Day cards (the 12-day list on the block view)
   ========================================================================= */

.days-list {
  display: flex;
  flex-direction: column;
  gap: var(--gap);
  margin-top: 20px;
}

.week-label {
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-faint);
  font-weight: 600;
  padding: 12px 4px 4px 4px;
}
.week-label:first-child { padding-top: 4px; }

.day-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s, transform 0.15s;
  user-select: none;
  -webkit-user-select: none;
}
.day-card:hover  { background: var(--surface-2); }
.day-card:active { background: var(--surface-3); }
.day-card.expand-pulse {
  transform: scale(0.99);
  border-color: var(--border-strong);
}

.day-card-row {
  display: grid;
  grid-template-columns: 36px 1fr;
  align-items: start;
  gap: 14px;
}

.day-card-main {
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-width: 0;
}

.day-card-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-dim);
  letter-spacing: 0.02em;
  margin-top: 6px;
}

.day-card-lifts {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

/* one lift row inside a day card */
.lift-row {
  display: grid;
  grid-template-columns: 1fr auto auto auto;
  align-items: baseline;
  gap: 10px;
  font-size: 15px;
  font-variant-numeric: tabular-nums;
  padding: 2px 0;
}
.lift-row.dim {
  color: var(--text-faint);
  font-size: 14px;
}
.lift-name {
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.lift-row.dim .lift-name {
  font-weight: 500;
  color: var(--text-dim);
}
.lift-presc {
  color: var(--text-dim);
  font-size: 13px;
  white-space: nowrap;
}
.lift-row.dim .lift-presc {
  color: var(--text-faint);
}
.lift-weight {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 17px;
  color: var(--text);
  white-space: nowrap;
  display: inline-flex;
  align-items: baseline;
  gap: 4px;
}
.lift-row.dim .lift-weight {
  font-weight: 600;
  font-size: 15px;
  color: var(--text-dim);
}
.lift-unit {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-faint);
  margin-left: 2px;
}

/* bumped weight styling - shown in green with an arrow indicator */
.lift-weight.bumped-up,
.lift-weight.bumped-down {
  color: var(--st-too-easy);
}
.lift-weight.bumped-up .lift-unit,
.lift-weight.bumped-down .lift-unit {
  color: var(--st-too-easy);
  opacity: 0.7;
}
.bump-arrow {
  font-size: 13px;
  font-weight: 700;
  line-height: 1;
}

/* +/- bump buttons (only visible inside expanded view) */
.bump-controls {
  display: inline-flex;
  gap: 4px;
  align-items: center;
  margin-left: 8px;
}
.bump-btn {
  width: 30px;
  height: 30px;
  border-radius: 8px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 16px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.12s, border-color 0.12s, transform 0.08s;
  font-family: var(--font-display);
}
.bump-btn:hover { background: var(--surface-3); border-color: var(--border-strong); }
.bump-btn:active { transform: scale(0.9); background: var(--surface-3); }

/* hide bump controls when collapsed (they only exist inside expanded section) */
.day-card .day-card-row .bump-controls { display: none; }

/* expanded section (accessories) - collapsed by default */
.day-card-expanded {
  display: grid;
  grid-template-rows: 0fr;
  transition: grid-template-rows 0.25s ease-out, opacity 0.2s, margin-top 0.2s;
  opacity: 0;
  overflow: hidden;
  margin-top: 0;
}
.day-card-expanded > * {
  min-height: 0;
}
.day-card.expanded .day-card-expanded {
  grid-template-rows: 1fr;
  opacity: 1;
  margin-top: 10px;
}

.expanded-inner {
  padding-top: 12px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.expanded-section {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.expanded-label {
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-faint);
  font-weight: 600;
  padding-bottom: 4px;
}

.status-dot-btn {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  background: transparent;
  position: relative;
}

.status-dot-btn::before {
  content: '';
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: var(--dot-color, var(--st-pending));
  box-shadow: 0 0 0 3px var(--surface);
  transition: transform 0.15s;
}
.status-dot-btn:active::before {
  transform: scale(0.85);
}

.status-dot-btn[data-status="pending"]   { --dot-color: var(--st-pending); }
.status-dot-btn[data-status="fail"]      { --dot-color: var(--st-fail); }
.status-dot-btn[data-status="partial"]   { --dot-color: var(--st-partial); }
.status-dot-btn[data-status="completed"] { --dot-color: var(--st-completed); }
.status-dot-btn[data-status="too_easy"]  { --dot-color: var(--st-too-easy); }

/* =========================================================================
   Day Detail view
   ========================================================================= */

.detail-header {
  display: grid;
  grid-template-columns: 44px 1fr 44px;
  align-items: center;
  margin-bottom: 16px;
}
.detail-title {
  text-align: center;
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 600;
}
.back-btn {
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-dim);
  font-size: 22px;
  border-radius: var(--radius-sm);
}
.back-btn:hover { color: var(--text); background: var(--surface-2); }

.status-picker {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 24px;
}

.status-btn {
  padding: 12px 6px;
  border-radius: var(--radius-sm);
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.02em;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  transition: all 0.15s;
}
.status-btn .pip {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--pip-color);
}
.status-btn[data-status="fail"]      { --pip-color: var(--st-fail); }
.status-btn[data-status="partial"]   { --pip-color: var(--st-partial); }
.status-btn[data-status="completed"] { --pip-color: var(--st-completed); }
.status-btn[data-status="too_easy"]  { --pip-color: var(--st-too-easy); }

.status-btn.active {
  background: var(--surface-3);
  border-color: var(--border-strong);
  color: var(--text);
}
.status-btn:active { transform: scale(0.97); }

/* exercise list */
.exercise-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.exercise-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  gap: 14px;
}

.exercise-card.is-fixed {
  background: var(--surface);
  opacity: 0.85;
}

.exercise-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
}
.exercise-prescription {
  font-size: 12px;
  color: var(--text-dim);
  font-variant-numeric: tabular-nums;
}

.exercise-weight {
  text-align: right;
  font-variant-numeric: tabular-nums;
}
.exercise-weight .primary {
  font-family: var(--font-display);
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.01em;
  color: var(--text);
}
.exercise-weight .unit {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-dim);
  margin-left: 2px;
}
.exercise-weight .subscript {
  display: block;
  font-size: 11px;
  color: var(--text-faint);
  margin-top: 2px;
}

/* =========================================================================
   Bottom tab bar
   ========================================================================= */

.tab-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(14, 15, 18, 0.92);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-top: 1px solid var(--border);
  padding: 8px 0 calc(8px + env(safe-area-inset-bottom)) 0;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  z-index: 100;
}

.tab-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 6px;
  color: var(--text-faint);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.02em;
  transition: color 0.15s;
}
.tab-btn .icon { font-size: 20px; line-height: 1; }
.tab-btn.active { color: var(--text); }

/* =========================================================================
   Block setup form (PR editor modal)
   ========================================================================= */

.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: none;
  align-items: flex-end;
  justify-content: center;
}
.modal-backdrop.open { display: flex; }

.modal {
  width: 100%;
  max-width: 640px;
  background: var(--surface);
  border-radius: 20px 20px 0 0;
  padding: 24px var(--pad) calc(24px + env(safe-area-inset-bottom));
  animation: slideUp 0.25s ease-out;
}
@keyframes slideUp {
  from { transform: translateY(20px); opacity: 0; }
  to   { transform: translateY(0); opacity: 1; }
}

.modal-handle {
  width: 44px;
  height: 4px;
  background: var(--border-strong);
  border-radius: 2px;
  margin: 0 auto 16px;
}

.modal-title {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 4px;
}
.modal-sub {
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 20px;
}

.pr-field {
  display: grid;
  grid-template-columns: 1fr 110px;
  align-items: center;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.pr-field:last-of-type { border-bottom: none; }

.pr-field label {
  font-size: 14px;
  font-weight: 500;
}
.pr-field .pr-sub {
  font-size: 11px;
  color: var(--text-dim);
  display: block;
  margin-top: 2px;
}

.pr-input {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  color: var(--text);
  font-size: 16px;
  font-family: var(--font-display);
  font-variant-numeric: tabular-nums;
  text-align: right;
  width: 100%;
}
.pr-input:focus {
  outline: none;
  border-color: var(--text-dim);
}

.modal-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 24px;
}

.btn {
  padding: 14px;
  border-radius: var(--radius-sm);
  font-size: 15px;
  font-weight: 600;
  text-align: center;
  transition: background 0.15s;
}
.btn-primary {
  background: var(--text);
  color: var(--bg);
}
.btn-primary:active { background: var(--accent); }
.btn-secondary {
  background: var(--surface-2);
  color: var(--text);
  border: 1px solid var(--border);
}
.btn-secondary:active { background: var(--surface-3); }

.set-current-row {
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.set-current-row label {
  font-size: 14px;
  color: var(--text-dim);
}
.set-current-btn {
  padding: 8px 14px;
  border-radius: var(--radius-sm);
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 13px;
  font-weight: 600;
}
.set-current-btn.is-current {
  background: var(--text);
  color: var(--bg);
  border-color: var(--text);
}

/* =========================================================================
   History view
   ========================================================================= */

.history-empty {
  color: var(--text-dim);
  text-align: center;
  padding: 40px 20px;
  font-size: 14px;
}

.history-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.history-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.history-item-main {
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-width: 0;
}
.history-item-title {
  font-weight: 600;
  font-size: 15px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.history-item-sub {
  font-size: 12px;
  color: var(--text-dim);
}
.history-summary {
  display: flex;
  gap: 6px;
}
.history-pip {
  width: 8px; height: 8px;
  border-radius: 50%;
}
.history-pip.fail      { background: var(--st-fail); }
.history-pip.partial   { background: var(--st-partial); }
.history-pip.completed { background: var(--st-completed); }
.history-pip.too_easy  { background: var(--st-too-easy); }
.history-pip.pending   { background: var(--st-pending); }

/* =========================================================================
   Header / brand
   ========================================================================= */

.app-header {
  text-align: center;
  padding: 14px 0 4px 0;
  font-family: var(--font-display);
  font-size: 13px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-faint);
  font-weight: 600;
}

/* utility */
.spacer-md { height: 20px; }
.subtle { color: var(--text-dim); }
.center { text-align: center; }

  </style>
</head>
<body>
  <div id="app">
    <section id="view-block" class="view active">
      <div class="app-header">BENCH PROGRAM</div>
      <div id="block-header" class="block-header"></div>
      <div id="days-list" class="days-list"></div>
    </section>
    <section id="view-detail" class="view"></section>
    <section id="view-history" class="view"></section>
  </div>
  <div id="modal-backdrop" class="modal-backdrop"></div>
  <nav class="tab-bar">
    <button class="tab-btn active" data-view="block"><span class="icon">▦</span><span>Block</span></button>
    <button class="tab-btn" data-view="edit"><span class="icon">✎</span><span>PRs</span></button>
    <button class="tab-btn" data-view="history"><span class="icon">⏱</span><span>History</span></button>
  </nav>

            <div class="expanded-inner">
              <div class="expanded-section">
                <div class="expanded-label">Main lifts \xB7 tap +/\u2212 to adjust</div>
                ${mainLifts.map((ex) => renderLiftRow(ex, { week: week.weekNumber, day: day.dayNumber, showBumpControls: true })).join("")}
              </div>
              ${accessories.length ? `
                <div class="expanded-section">
                  <div class="expanded-label">Accessories</div>
                  ${accessories.map((ex) => renderLiftRow(ex, { dim: true })).join("")}
                </div>
              ` : ""}
            </div>
          </div>
        </div>
      `;
    }).join("")}
  `).join("");
    document.getElementById("nav-prev").onclick = () => {
      if (!prev) return;
      state.viewingBlockId = prev.id;
      persist();
      renderBlockView();
    };
    document.getElementById("nav-next").onclick = () => {
      const next = getNextBlock(state, block.id, { autoCreate: true });
      if (!next) return;
      state.viewingBlockId = next.id;
      persist();
      renderBlockView();
    };
    document.getElementById("open-pr-editor").onclick = openPREditor;
    listEl.querySelectorAll(".status-dot-btn").forEach((btn) => {
      btn.onclick = (e) => {
        e.stopPropagation();
        const key = btn.dataset.key;
        const newStatus = nextStatus(getDayStatus(block, key));
        setDayStatus(block, key, newStatus);
        persist();
        btn.dataset.status = newStatus;
        btn.setAttribute("aria-label", `Day status: ${STATUS_LABELS[newStatus]}`);
      };
    });
    listEl.querySelectorAll(".day-card").forEach((card) => {
      attachExpandBehavior(card, block);
    });
  }
  var EXPAND_DELAY_MS = 500;
  var MOVE_CANCEL_PX = 12;
  function attachExpandBehavior(card, block) {
    let openTimer = null;
    let startX = 0, startY = 0;
    let expanded = false;
    function open() {
      if (expanded) return;
      card.classList.add("expanded");
      expanded = true;
    }
    function close() {
      if (!expanded) return;
      card.classList.remove("expanded");
      expanded = false;
    }
    function scheduleOpen() {
      cancelOpen();
      openTimer = setTimeout(() => {
        openTimer = null;
        open();
      }, EXPAND_DELAY_MS);
    }
    function cancelOpen() {
      if (openTimer) {
        clearTimeout(openTimer);
        openTimer = null;
      }
    }
    card.addEventListener("mouseenter", () => scheduleOpen());
    card.addEventListener("mouseleave", () => {
      cancelOpen();
      close();
    });
    card.addEventListener("touchstart", (e) => {
      if (e.target.closest(".status-dot-btn, .bump-btn")) return;
      const t = e.touches[0];
      startX = t.clientX;
      startY = t.clientY;
      scheduleOpen();
    }, { passive: true });
    card.addEventListener("touchmove", (e) => {
      const t = e.touches[0];
      if (Math.abs(t.clientX - startX) > MOVE_CANCEL_PX || Math.abs(t.clientY - startY) > MOVE_CANCEL_PX) {
        cancelOpen();
        close();
      }
    }, { passive: true });
    card.addEventListener("touchend", () => {
      cancelOpen();
      close();
    });
    card.addEventListener("touchcancel", () => {
      cancelOpen();
      close();
    });
    card.querySelectorAll(".bump-btn").forEach((btn) => {
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        const controls = btn.closest(".bump-controls");
        const kind = controls.dataset.bumpKind;
        const key = controls.dataset.bumpKey;
        const delta = btn.classList.contains("bump-up") ? 2.5 : -2.5;
        applyBump2(block, kind, key, delta);
        persist();
        const wasExpanded = expanded;
        renderBlockView();
        if (wasExpanded) {
          requestAnimationFrame(() => {
            const w = card.dataset.week;
            const d = card.dataset.day;
            const newCard = document.querySelector(`.day-card[data-week="${w}"][data-day="${d}"]`);
            if (newCard) newCard.classList.add("expanded");
          });
        }
      });
      btn.addEventListener("touchstart", (e) => e.stopPropagation(), { passive: true });
    });
  }
  function applyBump2(block, kind, key, delta) {
    if (kind === "bench") {
      const current = getBenchBump(block, key);
      setBenchBump(block, key, current + delta);
    } else if (kind === "lift") {
      const current = getLiftBump(block, key);
      setLiftBump(block, key, current + delta);
    }
  }
  function renderDayDetail() {
    const block = currentBlock();
    const compiled = compileBlock(PROGRAM_TEMPLATE, block.prs);
    const { weekNumber, dayNumber } = detailContext;
    const week = compiled.weeks.find((w) => w.weekNumber === weekNumber);
    const day = week.days.find((d) => d.dayNumber === dayNumber);
    const key = dayKey(weekNumber, dayNumber);
    const status = getDayStatus(block, key);
    const view = document.getElementById("view-detail");
    view.innerHTML = `
    <div class="detail-header">
      <button class="back-btn" id="back-btn" aria-label="Back">\u2190</button>
      <div class="detail-title">Week ${weekNumber} \xB7 Day ${dayNumber}</div>
      <div></div>
    </div>

    <div class="status-picker">
      ${["fail", "partial", "completed", "too_easy"].map((s) => `
        <button class="status-btn ${status === s ? "active" : ""}" data-status="${s}">
          <span class="pip"></span>
          <span>${STATUS_LABELS[s]}</span>
        </button>
      `).join("")}
    </div>

    <div class="exercise-list">
      ${day.exercises.map((ex) => {
      const isFixed = ex.type === "fixed";
      const presc = `${ex.prescription.sets} \xD7 ${ex.prescription.reps} @ RPE ${Array.isArray(ex.prescription.rpe) ? `${ex.prescription.rpe[0]}\u2013${ex.prescription.rpe[1]}` : ex.prescription.rpe}`;
      const w = ex.displayWeight;
      const sub = w.secondary != null && w.secondary !== w.primary ? `<span class="subscript">${fmtWeight(w.secondary)} kg @ low</span>` : "";
      return `
          <div class="exercise-card ${isFixed ? "is-fixed" : ""}">
            <div>
              <div class="exercise-name">${ex.name}</div>
              <div class="exercise-prescription">${presc}</div>
            </div>
            <div class="exercise-weight">
              <span class="primary">${fmtWeight(w.primary)}</span><span class="unit">kg</span>
              ${sub}
            </div>
          </div>
        `;
    }).join("")}
    </div>
  `;
    document.getElementById("back-btn").onclick = () => switchView("block");
    view.querySelectorAll(".status-btn").forEach((btn) => {
      btn.onclick = () => {
        const s = btn.dataset.status;
        const newStatus = status === s ? "pending" : s;
        setDayStatus(block, key, newStatus);
        persist();
        renderDayDetail();
      };
    });
  }
  function renderHistory() {
    const all = sortedBlocks(state);
    const view = document.getElementById("view-history");
    if (all.length === 0) {
      view.innerHTML = `<div class="app-header">History</div><div class="history-empty">No blocks yet.</div>`;
      return;
    }
    const reversed = [...all].reverse();
    view.innerHTML = `
    <div class="app-header">History</div>
    <div class="history-list">
      ${reversed.map((b) => {
      const category = categoriseBlock(b, state);
      const statuses = Object.values(b.dayStatuses);
      const summary = {
        completed: statuses.filter((s) => s === "completed" || s === "too_easy").length,
        partial: statuses.filter((s) => s === "partial").length,
        fail: statuses.filter((s) => s === "fail").length,
        pending: statuses.filter((s) => s === "pending").length
      };
      return `
          <div class="history-item" data-block-id="${b.id}">
            <div class="history-item-main">
              <div class="history-item-title">
                ${b.name}
                <span class="block-badge ${category}">${category.toUpperCase()}</span>
              </div>
              <div class="history-item-sub">Goal 1RM: ${b.prs.bench} kg \xB7 ${summary.completed}/12 sessions</div>
            </div>
            <div class="history-summary">
              ${statuses.map((s) => `<div class="history-pip ${s}"></div>`).join("")}
            </div>
          </div>
        `;
    }).join("")}
    </div>
  `;
    view.querySelectorAll(".history-item").forEach((item) => {
      item.onclick = () => {
        state.viewingBlockId = item.dataset.blockId;
        persist();
        switchView("block");
      };
    });
  }
  function openPREditor() {
    const block = currentBlock();
    const prev = getPreviousBlock(state, block.id);
    const isCurrent = state.activeBlockId === block.id;
    const modal = document.getElementById("modal-backdrop");
    modal.innerHTML = `
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title">${block.name} \xB7 PRs</div>
      <div class="modal-sub">Set the goal 1RM and per-lift training maxes for this block. Future blocks chain at +5 kg from here.</div>

      <div class="pr-field">
        <div>
          <label for="pr-bench">Goal 1RM (Bench)</label>
          <span class="pr-sub">drives all bench + backdown work</span>
        </div>
        <input class="pr-input" id="pr-bench" type="number" inputmode="decimal" step="0.5" value="${block.prs.bench}">
      </div>
      <div class="pr-field">
        <label for="pr-cg">CG Bench</label>
        <input class="pr-input" id="pr-cg" type="number" inputmode="decimal" step="0.5" value="${block.prs.cgBench}">
      </div>
      <div class="pr-field">
        <label for="pr-spotto">Spotto press</label>
        <input class="pr-input" id="pr-spotto" type="number" inputmode="decimal" step="0.5" value="${block.prs.spotto}">
      </div>
      <div class="pr-field">
        <label for="pr-dips">Dips (loaded)</label>
        <input class="pr-input" id="pr-dips" type="number" inputmode="decimal" step="0.5" value="${block.prs.dips}">
      </div>
      <div class="pr-field">
        <label for="pr-incline">Incline DB press</label>
        <input class="pr-input" id="pr-incline" type="number" inputmode="decimal" step="0.5" value="${block.prs.inclineDB}">
      </div>

      <div class="set-current-row">
        <label>Mark this block as "current"</label>
        <button class="set-current-btn ${isCurrent ? "is-current" : ""}" id="set-current">
          ${isCurrent ? "\u2713 Current" : "Set as current"}
        </button>
      </div>

      <div class="modal-actions">
        <button class="btn btn-secondary" id="modal-cancel">Cancel</button>
        <button class="btn btn-primary" id="modal-save">Save</button>
      </div>
    </div>
  `;
    modal.classList.add("open");
    document.getElementById("set-current").onclick = () => {
      setActiveBlock(state, block.id);
      persist();
      openPREditor();
    };
    document.getElementById("modal-cancel").onclick = closeModal;
    modal.onclick = (e) => {
      if (e.target === modal) closeModal();
    };
    document.getElementById("modal-save").onclick = () => {
      const newPRs = {
        bench: parseFloat(document.getElementById("pr-bench").value),
        cgBench: parseFloat(document.getElementById("pr-cg").value),
        spotto: parseFloat(document.getElementById("pr-spotto").value),
        dips: parseFloat(document.getElementById("pr-dips").value),
        inclineDB: parseFloat(document.getElementById("pr-incline").value)
      };
      for (const [k, v] of Object.entries(newPRs)) {
        if (!Number.isFinite(v) || v <= 0) {
          alert(`Invalid value for ${k}`);
          return;
        }
      }
      updateBlockPRs(state, block.id, newPRs);
      persist();
      closeModal();
      renderBlockView();
    };
  }
  function closeModal() {
    document.getElementById("modal-backdrop").classList.remove("open");
  }
  function switchView(view) {
    currentView = view;
    document.querySelectorAll(".view").forEach((v) => v.classList.remove("active"));
    document.querySelectorAll(".tab-btn").forEach((b) => b.classList.remove("active"));
    if (view === "block") document.getElementById("view-block").classList.add("active");
    if (view === "detail") document.getElementById("view-detail").classList.add("active");
    if (view === "history") document.getElementById("view-history").classList.add("active");
    const tab = document.querySelector(`.tab-btn[data-view="${view === "detail" ? "block" : view}"]`);
    if (tab) tab.classList.add("active");
    if (view === "block") renderBlockView();
    if (view === "detail") renderDayDetail();
    if (view === "history") renderHistory();
  }
  function init() {
    document.querySelectorAll(".tab-btn").forEach((btn) => {
      btn.onclick = () => switchView(btn.dataset.view);
    });
    const newBtn = document.querySelector('.tab-btn[data-view="edit"]');
    if (newBtn) newBtn.onclick = openPREditor;
    switchView("block");
  }
  document.addEventListener("DOMContentLoaded", init);
})();

  </script>
</body>
