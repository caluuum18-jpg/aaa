<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Bench">
  <meta name="theme-color" content="#0e0f12">
  <title>Bench Program</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app">
    <!-- BLOCK VIEW -->
    <section id="view-block" class="view active">
      <div class="app-header">BENCH PROGRAM</div>
      <div id="block-header" class="block-header"></div>
      <div id="days-list" class="days-list"></div>
    </section>

    <!-- DAY DETAIL VIEW -->
    <section id="view-detail" class="view"></section>

    <!-- HISTORY VIEW -->
    <section id="view-history" class="view"></section>
  </div>

  <!-- Modal: PR editor -->
  <div id="modal-backdrop" class="modal-backdrop"></div>

  <!-- Bottom tab bar -->
  <nav class="tab-bar">
    <button class="tab-btn active" data-view="block">
      <span class="icon">▦</span>
      <span>Block</span>
    </button>
    <button class="tab-btn" data-view="edit">
      <span class="icon">✎</span>
      <span>PRs</span>
    </button>
    <button class="tab-btn" data-view="history">
      <span class="icon">⏱</span>
      <span>History</span>
    </button>
  </nav>

  <script type="module" src="js/app.js"></script>
</body>
</html>
